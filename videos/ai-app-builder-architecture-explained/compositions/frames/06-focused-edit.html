    function targetCenter(id) {
      const rootBox = root.getBoundingClientRect();
      const box = document.getElementById(id).getBoundingClientRect();
      return {
        x: (box.left + box.width / 2 - rootBox.left) * (1920 / rootBox.width),
        y: (box.top + box.height / 2 - rootBox.top) * (1080 / rootBox.height)
      };
    }
    function cursorPose(point) { return { x: point.x - CURSOR_TIP.x, y: point.y - CURSOR_TIP.y }; }
    function placeRipple(id, point) { gsap.set(id, { x: point.x, y: point.y, scale: .25, opacity: 0 }); }

    const points = {
      headline: targetCenter("f06-headline-target"),
      prompt: targetCenter("f06-prompt-box"),
      update: targetCenter("f06-update")
    };
    placeRipple("#f06-selection-ripple", points.headline);
    placeRipple("#f06-update-ripple", points.update);
    gsap.set(cursor, { ...cursorPose({ x: 1870, y: 770 }), opacity: 0 });

    tl.to("#f06-selection-ripple", { opacity: 0, scale: 2.8, duration: .5, ease: "power3.out", immediateRender: false }, 1.34);

    tl.to("#f06-focus-wash", { opacity: 1, duration: .46, ease: "power2.out" }, 1.62);
    tl.fromTo("#f06-edit-tray", { opacity: 0, x: 42, scale: .97 }, { opacity: 1, x: 0, scale: 1, duration: .56, ease: "power3.out" }, 1.78);
    tl.to("#f06-app-camera", { scale: 1.026, x: -12, y: -3, duration: .62, ease: "power3.inOut" }, 1.78);
    tl.to(cursor, { ...cursorPose(points.prompt), duration: .62, ease: "power3.inOut" }, 2.35);

    tl.to(typing, { count: phrase.length, duration: 1.6, ease: "none", onUpdate: function(){ prompt.textContent = phrase.slice(0, Math.floor(typing.count)); } }, 3.0);
    tl.to(blink, { p: Math.PI * 8, duration: 1.9, ease: "none", onUpdate: function(){ caret.style.opacity = Math.sin(blink.p) > 0 ? "1" : "0"; } }, 3.0);
    tl.to(cursor, { ...cursorPose(points.update), duration: .48, ease: "power3.out" }, 4.7);
    tl.to(["#f06-update", cursor], { scale: .92, duration: .11, ease: "power1.in" }, 5.22);

    tl.to(["#f06-update", cursor], { scale: 1, duration: .28, ease: "power2.out" }, 5.33);
    tl.to("#f06-update", { backgroundColor: "#1748B5", duration: .18 }, 5.24);

    tl.fromTo(".proof-pill", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: .32, stagger: .12, ease: "power2.out" }, 6.2);
