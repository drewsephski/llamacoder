          { opacity: 0, x: 46 },

        const rowStarts = [1.82, 2.58, 3.34, 4.1, 4.86, 5.62];
        rowStarts.forEach((start, index) => {
          const row = document.getElementById(`f07-row-${index + 1}`);
          const sweep = row.querySelector(".row-sweep");
          tl.fromTo(
            row,
            { opacity: 0, x: 54, scale: 0.985 },
            { opacity: 1, x: 0, scale: 1, duration: 0.5, ease: "power3.out" },
            start,
          );
          tl.fromTo(
            sweep,
            { opacity: 0.32, x: 0 },
            { opacity: 0, x: 1140, duration: 0.64, ease: "power2.out" },
            start + 0.04,
          );
        });

        const discreteState = { t: 0 };
        const deltaTimes = [2.24, 3.0, 3.76, 4.52, 5.28, 6.04];
        tl.to(
          discreteState,
          {
            t: 10.371,
            duration: 10.371,
            ease: "none",
            onUpdate: () => {
              deltas.forEach((delta, index) => {
                delta.textContent = discreteState.t >= deltaTimes[index] ? "PASS / +" : "—";
              });
              if (discreteState.t >= 8) {
                topbarTitle.textContent = "QUALITY: VISIBLE";
                topbarTag.textContent = "DENSE REPORT / INSPECTABLE";
              } else {
                topbarTitle.textContent = "DIAGNOSTIC / LEDGER";
                topbarTag.textContent = "NORMALIZE → INSPECT → REPORT";

            },

        tl.fromTo(
          "#f07-metrics",
          { opacity: 0, y: 28 },
          { opacity: 1, y: 0, duration: 0.46, ease: "power3.out" },
          6.8,
        );

        const filesCounter = document.getElementById("f07-files-count");
        const importsCounter = document.getElementById("f07-imports-count");
        const countState = { files: 0, imports: 0 };
        tl.to(
          countState,
          {
            files: 6,
            imports: 6,
            duration: 1.12,
            ease: "power3.out",
            onUpdate: () => {

              importsCounter.textContent = String(Math.round(countState.imports)).padStart(2, "0");

          { scale: 0.74, opacity: 0.35 },
