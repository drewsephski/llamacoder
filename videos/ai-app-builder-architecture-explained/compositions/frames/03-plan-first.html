  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const root = document.getElementById("root");
    const tl = gsap.timeline({ paused: true });
    const cursor = document.getElementById("f03-cursor");
    const CURSOR_TIP = { x: 2, y: 2 };

    function targetCenter(id) {
      const rootBox = root.getBoundingClientRect();
      const box = document.getElementById(id).getBoundingClientRect();
      const scaleX = 1920 / rootBox.width;
      const scaleY = 1080 / rootBox.height;
      return {
        x: (box.left + box.width / 2 - rootBox.left) * scaleX,
        y: (box.top + box.height / 2 - rootBox.top) * scaleY
      };
    }

    const points = {
      sourceA: targetCenter("f03-source-a"),
      sourceB: targetCenter("f03-source-b"),
      sourceC: targetCenter("f03-source-c"),
      q1: targetCenter("f03-q1-choice"),
      q2: targetCenter("f03-q2-choice"),
      q3: targetCenter("f03-q3-choice"),
      approve: targetCenter("f03-approve")
    };

    function cursorPose(point) { return { x: point.x - CURSOR_TIP.x, y: point.y - CURSOR_TIP.y }; }
    function placeRipple(id, point) { gsap.set(id, { x: point.x, y: point.y, scale: 0.28, opacity: 0 }); }
    function clickAt(time, targetId, rippleId, point, progressIndex) {
      tl.to(cursor, { scale: .84, duration: .08, ease: "power2.in" }, time);
      tl.to(targetId, { scale: .96, duration: .08, ease: "power2.in" }, time);
      tl.to(cursor, { scale: 1, duration: .18, ease: "power2.out" }, time + .08);
      tl.to(targetId, { scale: 1, duration: .18, ease: "power2.out" }, time + .08);
      tl.to(rippleId, { scale: 1.55, opacity: .7, duration: .12, ease: "power2.out", immediateRender: false }, time);
      tl.to(rippleId, { scale: 2.7, opacity: 0, duration: .48, ease: "power3.out", immediateRender: false }, time + .1);
      if (progressIndex) {
        tl.to(targetId, { backgroundColor: "#326DF5", borderColor: "#326DF5", color: "#FFFFFF", duration: .18 }, time + .05);
        tl.to(targetId + " .choice-icon", { backgroundColor: "rgba(255,255,255,.18)", color: "#FFFFFF", duration: .18 }, time + .05);
        tl.to(targetId + " > i", { opacity: 1, duration: .16 }, time + .08);
        tl.to(".question-rail i:nth-child(" + progressIndex + ")", { backgroundColor: "#326DF5", duration: .2 }, time + .05);
        tl.to("#f03-progress-copy", { opacity: .45, duration: .08 }, time + .02);
        tl.call(function(){ document.getElementById("f03-progress-copy").textContent = progressIndex + " / 3"; }, null, time + .1);
        tl.to("#f03-progress-copy", { opacity: 1, duration: .14 }, time + .1);
      }
    }

    placeRipple("#f03-ripple-q1", points.q1);
    placeRipple("#f03-ripple-q2", points.q2);
    placeRipple("#f03-ripple-q3", points.q3);
    placeRipple("#f03-ripple-approve", points.approve);

    const sourcePath = document.getElementById("f03-source-path");
    const sourceLength = sourcePath.getTotalLength();
    gsap.set(sourcePath, { strokeDasharray: sourceLength, strokeDashoffset: sourceLength });
    gsap.set(["#f03-q1", "#f03-q2", "#f03-q3", "#f03-plan"], { opacity: 0, scale: .965 });
    gsap.set(cursor, { ...cursorPose({ x: 1860, y: 760 }), opacity: 0 });

    tl.fromTo("#f03-prompt-card", { opacity: 0, x: -26, rotationY: -3 }, { opacity: 1, x: 0, rotationY: 0, duration: .62, ease: "power3.out" }, 0);
    tl.fromTo("#f03-research", { opacity: 0, x: 42, rotationY: 2 }, { opacity: 1, x: 0, rotationY: 0, duration: .68, ease: "power3.out" }, .06);
    tl.to(sourcePath, { strokeDashoffset: 0, duration: 1.46, ease: "power2.out" }, .34);
    tl.fromTo("#f03-beam-scan", { opacity: 0, x: 0 }, { opacity: 1, x: 824, duration: 1.65, ease: "power2.inOut" }, .38);
    tl.fromTo("#f03-source-a", { opacity: 0, y: 18, scale: .94 }, { opacity: 1, y: 0, scale: 1, duration: .42, ease: "power3.out" }, .6);
    tl.fromTo("#f03-source-b", { opacity: 0, y: 18, scale: .94 }, { opacity: 1, y: 0, scale: 1, duration: .42, ease: "power3.out" }, 1.08);
    tl.fromTo("#f03-source-c", { opacity: 0, y: 18, scale: .94 }, { opacity: 1, y: 0, scale: 1, duration: .42, ease: "power3.out" }, 1.56);
    tl.fromTo(cursor, { ...cursorPose({ x: 1860, y: 720 }), opacity: 0 }, { ...cursorPose(points.sourceA), opacity: 1, duration: .5, ease: "power3.out" }, .5);
    tl.to(cursor, { ...cursorPose(points.sourceB), duration: .54, ease: "power2.inOut" }, 1.02);
    tl.to(cursor, { ...cursorPose(points.sourceC), duration: .54, ease: "power2.inOut" }, 1.53);
    tl.fromTo(".source-footer", { opacity: 0, y: 12 }, { opacity: 1, y: 0, duration: .38, ease: "power2.out" }, 1.9);
    tl.fromTo(".source-meter i", { scaleX: 0 }, { scaleX: 1, duration: .55, ease: "power2.out" }, 1.92);

    tl.to("#f03-research", { opacity: 0, scale: .94, duration: .3, ease: "power2.in" }, 2.36);
    tl.fromTo("#f03-q1", { opacity: 0, scale: .965 }, { opacity: 1, scale: 1, duration: .42, ease: "power3.out" }, 2.5);
    tl.to(cursor, { ...cursorPose(points.q1), duration: .52, ease: "power2.inOut" }, 2.68);
    clickAt(3.24, "#f03-q1-choice", "#f03-ripple-q1", points.q1, 1);

    tl.to("#f03-q1", { opacity: 0, scale: .94, duration: .22, ease: "power2.in" }, 3.54);
    tl.fromTo("#f03-q2", { opacity: 0, scale: .965 }, { opacity: 1, scale: 1, duration: .34, ease: "power3.out" }, 3.7);
    tl.to(cursor, { ...cursorPose(points.q2), duration: .34, ease: "power2.inOut" }, 3.73);
    clickAt(4.1, "#f03-q2-choice", "#f03-ripple-q2", points.q2, 2);

    tl.to("#f03-q2", { opacity: 0, scale: .94, duration: .22, ease: "power2.in" }, 4.36);
    tl.fromTo("#f03-q3", { opacity: 0, scale: .965 }, { opacity: 1, scale: 1, duration: .34, ease: "power3.out" }, 4.5);
    tl.to(cursor, { ...cursorPose(points.q3), duration: .3, ease: "power2.inOut" }, 4.52);
    clickAt(4.86, "#f03-q3-choice", "#f03-ripple-q3", points.q3, 3);

    tl.to("#f03-q3", { opacity: 0, scale: .94, duration: .3, ease: "power2.in" }, 5.18);
    tl.fromTo("#f03-plan", { opacity: 0, scale: .965, rotationY: 2 }, { opacity: 1, scale: 1, rotationY: 0, duration: .58, ease: "power3.out" }, 5.34);
    tl.fromTo(".plan-layer", { opacity: 0, y: 18 }, { opacity: .72, y: 0, duration: .52, stagger: .08, ease: "power2.out" }, 5.4);
    tl.fromTo(".plan-grid section", { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: .48, stagger: .23, ease: "power3.out" }, 5.96);
    tl.fromTo("#f03-build-hold", { opacity: 0, x: -18 }, { opacity: 1, x: 0, duration: .4, ease: "power3.out" }, 7.38);
    tl.to(cursor, { ...cursorPose(points.approve), duration: .72, ease: "power3.inOut" }, 7.9);

    tl.to(["#f03-approve", cursor], { scale: .92, duration: .12, ease: "power1.in" }, 8.66);
    tl.to("#f03-ripple-approve", { scale: 1.35, opacity: .72, duration: .12, ease: "power2.out", immediateRender: false }, 8.66);
    tl.to("#f03-ripple-approve", { scale: 3.2, opacity: 0, duration: .58, ease: "power3.out", immediateRender: false }, 8.76);
    tl.to(["#f03-approve", cursor], { scale: 1, duration: .32, ease: "power2.out" }, 8.78);
    tl.to("#f03-approve", { backgroundColor: "#059669", duration: .24, ease: "power1.out" }, 8.7);
    tl.to(".approve-label", { opacity: 0, duration: .14 }, 8.7);
    tl.to(".approved-label", { opacity: 1, duration: .22 }, 8.78);
    tl.to("#f03-plan-status", { color: "#045F46", backgroundColor: "rgba(5,150,105,.12)", duration: .24 }, 8.72);
    tl.to("#f03-plan-status i", { backgroundColor: "#059669", duration: .2 }, 8.72);
    tl.to(".waiting-copy", { opacity: 0, duration: .1 }, 8.72);
    tl.to(".approved-copy", { opacity: 1, duration: .18 }, 8.82);
    tl.to("#f03-build-hold", { opacity: .46, duration: .28 }, 8.78);

    window.__timelines["03-plan-first"] = tl;
  </script>
</template>
