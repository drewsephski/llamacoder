    <script>

        const root = document.querySelector('[data-composition-id="02-meet-squid"]');
        const cursor = document.getElementById("f02-cursor");
        const ROOT_W = 1920, ROOT_H = 1080, TIP_X = 5, TIP_Y = 3, RIPPLE_R = 26;
        const rootRect = root.getBoundingClientRect();
        const sx = ROOT_W / rootRect.width, sy = ROOT_H / rootRect.height;
        const localCenter = (id) => { const r = document.getElementById(id).getBoundingClientRect(); return { x: (r.left + r.width / 2 - rootRect.left) * sx, y: (r.top + r.height / 2 - rootRect.top) * sy }; };
        const cursorBase = { x: cursor.offsetLeft + TIP_X, y: cursor.offsetTop + TIP_Y };
        const targets = {
          field: localCenter("f02-prompt-field"), shot: localCenter("f02-chip-shot"), site: localCenter("f02-chip-site"), build: localCenter("f02-build")
        };
        const vector = (p) => ({ x: p.x - cursorBase.x, y: p.y - cursorBase.y });
        [["f02-ripple-field",targets.field],["f02-ripple-shot",targets.shot],["f02-ripple-site",targets.site],["f02-ripple-build",targets.build]].forEach(([id,p]) => { const el=document.getElementById(id); el.style.left=`${p.x-RIPPLE_R}px`; el.style.top=`${p.y-RIPPLE_R}px`; });

        const tl = gsap.timeline({ paused: true });

          tl.to("#f02-cursor",{scale:.84,duration:.08,ease:"power2.in",yoyo:true,repeat:1},at);
          tl.to(targetId,{scale:targetScale,duration:.08,ease:"power2.in",yoyo:true,repeat:1},at);
          tl.fromTo(rippleId,{opacity:.62,scale:.15},{opacity:0,scale:2.25,duration:.52,ease:"power2.out",immediateRender:false},at);
        };
        tl.fromTo("#f02-product",{opacity:0,y:34,scale:.97},{opacity:1,y:0,scale:1,duration:.72,ease:"power3.out"},0);
        tl.fromTo(".logo-shell",{opacity:0,scale:.76,rotation:-7},{opacity:1,scale:1,rotation:0,duration:.62,ease:"power3.out"},.03);
        tl.fromTo(".headline",{opacity:0,x:-16},{opacity:1,x:0,duration:.48,ease:"power2.out"},.2);
        tl.fromTo(".eyebrow",{opacity:0,y:7},{opacity:1,y:0,duration:.4,ease:"power2.out"},.34);
        tl.fromTo(".tag-pill",{opacity:0,x:18},{opacity:1,x:0,duration:.45,ease:"power2.out"},.5);
        tl.fromTo("#f02-cursor",{opacity:0,x:92,y:52},{opacity:1,x:0,y:0,duration:.62,ease:"power3.out"},.86);

        const fieldV=vector(targets.field), shotV=vector(targets.shot), siteV=vector(targets.site), buildV=vector(targets.build);
        tl.to("#f02-cursor",{x:fieldV.x,y:fieldV.y,duration:.62,ease:"power3.out"},1.72); click("#f02-prompt-field","#f02-ripple-field",2.34,.985);
        tl.to("#f02-zoom-outer",{scale:1.045,duration:.68,ease:"power3.inOut"},2.42); tl.to("#f02-zoom-inner",{y:-22,duration:.68,ease:"power3.inOut"},2.42);
        const phrase="Build a simple booking app", typing={count:0}, typed=document.getElementById("f02-typed-text");
        tl.to(typing,{count:phrase.length,duration:1.38,ease:"none",onUpdate:()=>{typed.textContent=phrase.slice(0,Math.floor(typing.count));}},2.48);
        const blink={phase:0}; tl.to(blink,{phase:Math.PI*18,duration:8.415,ease:"none",onUpdate:()=>{document.getElementById("f02-type-caret").style.opacity=Math.sin(blink.phase)>0?"1":".18";}},0);
        tl.to("#f02-zoom-outer",{scale:1,duration:.35,ease:"power2.inOut"},3.83); tl.to("#f02-zoom-inner",{y:0,duration:.35,ease:"power2.inOut"},3.83);

        tl.fromTo("#f02-chip-shot",{opacity:0,y:14,scale:.95},{opacity:1,y:0,scale:1,duration:.4,ease:"power3.out"},4.12);
        tl.to("#f02-cursor",{x:shotV.x,y:shotV.y,duration:.42,ease:"power3.out"},4.2); click("#f02-chip-shot","#f02-ripple-shot",4.64);
        tl.to("#f02-chip-shot",{backgroundColor:"#326df5",color:"#ffffff",duration:.22,ease:"power1.out"},4.64); tl.to("#f02-chip-shot b",{opacity:1,duration:.18},4.65);
        tl.fromTo("#f02-chip-site",{opacity:0,y:14,scale:.95},{opacity:1,y:0,scale:1,duration:.4,ease:"power3.out"},4.73);
        tl.to("#f02-cursor",{x:siteV.x,y:siteV.y,duration:.36,ease:"power3.out"},4.9); click("#f02-chip-site","#f02-ripple-site",5.28);
        tl.to("#f02-chip-site",{backgroundColor:"#326df5",color:"#ffffff",duration:.22,ease:"power1.out"},5.28); tl.to("#f02-chip-site b",{opacity:1,duration:.18},5.29);

        tl.to("#f02-cursor",{x:buildV.x,y:buildV.y,duration:.52,ease:"power3.out"},5.52); click("#f02-build","#f02-ripple-build",6.06,.95);
        tl.to(".content-old",{opacity:0,duration:.3,ease:"power1.in"},6.14);

      })();
