        .prompt-kicker {

          left: 0;

          font-size: 15px;

        .hero {

          font-size: 165px;
          font-weight: 400;
          line-height: 0.9;
          letter-spacing: -0.008em;
          white-space: nowrap;
        }

        .process-map {
          position: absolute;
          left: 0;
          top: 0;
          width: 1920px;
          height: 860px;
          overflow: visible;
        }

        .process-map path {
          fill: none;
          stroke: #1f2be0;
          stroke-width: 3;
          stroke-linecap: square;
          stroke-linejoin: miter;
        }

        .stage-labels {
          position: absolute;
          left: 170px;
          top: 728px;
          width: 1575px;
          display: grid;
          grid-template-columns: repeat(10, 1fr);
          font-family: "DM Mono";
          font-size: 14px;
          letter-spacing: 0.06em;

        .stage-label {
          display: block;

        .system-label {

          left: 170px;
          top: 790px;
          font-family: "Hanken Grotesk";
          font-size: 15px;
          font-weight: 600;
          letter-spacing: 0.18em;
          text-transform: uppercase;
          opacity: 0;
        }
      </style>

        <div data-hf-id="hf-ptzl" class="clip stage" data-start="0" data-duration="6.408" data-track-index="1">

                <span data-hf-id="hf-wfj2" class="prompt-text-wrap">
                  <span data-hf-id="hf-pt0l" id="frame01-prompt-text"></span><span data-hf-id="hf-le01" class="prompt-cursor" id="frame01-prompt-cursor">_</span>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const frame01Timeline = gsap.timeline({ paused: true });
        const frame01PromptText = document.getElementById("frame01-prompt-text");
        const frame01PromptCursor = document.getElementById("frame01-prompt-cursor");
        const frame01Phrase = "PROMPT → PREVIEW";
        const frame01Typing = { value: 0 };
        const frame01Blink = { phase: 0 };

        frame01Timeline.fromTo(
          "#frame01-prompt-box",
          { opacity: 0, y: 28 },
          { opacity: 1, y: 0, duration: 0.42, ease: "power3.out" },
          0.08,
        );

        frame01Timeline.to(
          frame01Typing,
          {
            value: frame01Phrase.length,
            duration: 1.36,
            ease: "power1.inOut",
            onUpdate: () => {
              frame01PromptText.textContent = frame01Phrase.substring(0, Math.floor(frame01Typing.value));
            },
          },
          0.22,
        );

        frame01Timeline.to(
          frame01Blink,
          {
            phase: Math.PI * 8,
            duration: 1.8,
            ease: "none",
            onUpdate: () => {
              frame01PromptCursor.style.opacity = Math.sin(frame01Blink.phase) >= 0 ? "1" : "0";
            },
          },
          0,
        );

        const frame01BlurNode = document.getElementById("frame01-streak-blur");
        const frame01Blur = { value: 24 };
        const frame01WriteBlur = () => {
          frame01BlurNode.setAttribute("stdDeviation", `${frame01Blur.value} 0`);
        };
        frame01WriteBlur();

        frame01Timeline.fromTo(
          "#frame01-hero-wrap",
          { x: 1880, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.58, ease: "power4.out" },
          1.8,
        );
        frame01Timeline.to(
          frame01Blur,
          {
            value: 0,
            duration: 0.58,
            ease: "power4.out",
            onUpdate: frame01WriteBlur,
          },
          1.8,
        );
        frame01Timeline.fromTo(
          "#frame01-prompt-box",
          { x: 0 },
          { x: -700, duration: 0.62, ease: "power2.out" },
          1.82,
        );

        const frame01TickPaths = Array.from(document.querySelectorAll(".frame01-stage-tick"));
        frame01TickPaths.forEach((path, index) => {
          const length = path.getTotalLength();
          path.style.strokeDasharray = `${length}`;
          path.style.strokeDashoffset = `${length}`;
          frame01Timeline.to(
            path,
            { strokeDashoffset: 0, duration: 0.36, ease: "power2.out" },
            2.34 + index * 0.18,
          );
        });

        frame01Timeline.fromTo(
          ".stage-label",
          { opacity: 0, y: 12 },
          { opacity: 1, y: 0, duration: 0.28, stagger: 0.18, ease: "power2.out" },
          2.48,
        );

        const frame01Rail = document.getElementById("frame01-process-rail");
        const frame01RailLength = frame01Rail.getTotalLength();
        frame01Rail.style.strokeDasharray = `${frame01RailLength}`;
        frame01Rail.style.strokeDashoffset = `${frame01RailLength}`;
        frame01Timeline.to(
          frame01Rail,
          { strokeDashoffset: 0, duration: 0.78, ease: "power2.out" },
          4.4,
        );
        frame01Timeline.fromTo(
          ".system-label",
          { opacity: 0, x: 36 },
          { opacity: 1, x: 0, duration: 0.42, ease: "power3.out" },
          4.72,
        );

        frame01Timeline.to(
          "#frame01-zoom-outer",
          { scale: 1.1, duration: 0.52, ease: "power3.inOut" },
          5.2,
        );
        frame01Timeline.to(
          "#frame01-zoom-inner",
          { x: 0, y: -58, duration: 0.52, ease: "power3.inOut" },
          5.2,
        );

        window.__timelines["01-hidden-system"] = frame01Timeline;
      </script>
