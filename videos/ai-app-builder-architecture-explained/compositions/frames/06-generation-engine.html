        const railCursor = document.getElementById("f06-generation-engine-rail-cursor");

        const deltaMarkers = Array.from(document.querySelectorAll(".delta-marker"));
        const streamPaths = Array.from(document.querySelectorAll(".stream-path, .stream-branch"));

        streamPaths.forEach((path) => {
          const length = path.getTotalLength();
          path.style.strokeDasharray = String(length);
          path.style.strokeDashoffset = String(length);
        });

        const railStates = [
          { t: 0, text: "" },
          { t: 0.22, text: "ROUTE /" },
          { t: 0.54, text: "ROUTE / PROVIDER:AUTO" },
          { t: 1.02, text: "ROUTE / PROVIDER:AUTO  MODEL:" },
          { t: 1.46, text: "ROUTE / PROVIDER:AUTO  MODEL:QUALIFIED" },
          { t: 1.82, text: "ROUTE / PROVIDER:AUTO  MODEL:QUALIFIED  ✓" },
        ];

        function railTextAt(time) {
          for (let i = railStates.length - 1; i >= 0; i -= 1) {
            if (time >= railStates[i].t) return railStates[i].text;
          }
          return "";
        }

        const railDriver = { t: 0 };
        tl.to(
          railDriver,
          {
            t: 2.08,
            duration: 2.08,
            ease: "none",
            onUpdate: () => {
              railCopy.textContent = railTextAt(railDriver.t);
              railCursor.style.opacity = Math.sin(railDriver.t * Math.PI * 5) > 0 ? "1" : "0";
            },
          },
          0,
        );

        tl.fromTo(
          spec,
          { scale: 0.86, opacity: 0, y: 20 },
          { scale: 1, opacity: 1, y: 0, duration: 0.62, ease: "power3.out" },

          { opacity: 1, scaleX: 1, duration: 0.54, ease: "power3.out" },
          0.28,

        streamPaths.forEach((path, index) => {
