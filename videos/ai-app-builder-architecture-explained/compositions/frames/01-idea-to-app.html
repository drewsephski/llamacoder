                      <h4 data-hf-id="hf-z53j">Thoughtful by default</h4>
                      <div data-hf-id="hf-r8y1" class="chip-row"><span data-hf-id="hf-8t6i" class="app-chip">Follow-up</span><span data-hf-id="hf-0gbp" class="app-chip">Gallery</span><span data-hf-id="hf-3wyq" class="app-chip">Notes</span></div>
                    </section>
                  </div>
                </div>
              </main>
            </div>

            <div data-hf-id="hf-neun" class="specular" id="f01-idea-to-app-specular" aria-hidden="true"></div>
            <div data-hf-id="hf-3hav" class="product-label app-reveal">WORKING APP</div>
          </div>

          <div data-hf-id="hf-lxwj" class="progress-track"><span data-hf-id="hf-fgw9" class="progress-fill" id="f01-idea-to-app-progress"></span></div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const DURATION = 4.571;
        const ideaSequence = [
          { t: 0.00, text: "", color: "#326df5" },
          { t: 0.16, text: "WHAT", color: "#0a0a0a" },
          { t: 0.34, text: "WHAT IF", color: "#0a0a0a" },
          { t: 0.58, text: "WHAT IF YOUR", color: "#326df5" },
          { t: 0.88, text: "WHAT IF YOUR APP", color: "#326df5" },
          { t: 1.22, text: "WHAT IF YOUR APP IDEA", color: "#326df5" },
          { t: 1.54, text: "WHAT IF YOUR APP IDEA…", color: "#326df5" }
        ];
        const waitSequence = [
          { t: 0.00, text: "" },
          { t: 1.86, text: "WAIT" },
          { t: 2.14, text: "WAIT MONTHS" }
        ];

        function entryAt(sequence, time) {
          for (let index = sequence.length - 1; index >= 0; index -= 1) {
            if (time >= sequence[index].t) return sequence[index];
          }
          return sequence[0];
        }

        const ideaText = document.getElementById("f01-idea-to-app-typed-copy");
        const waitText = document.getElementById("f01-idea-to-app-wait-copy");
        const mainCaret = document.getElementById("f01-idea-to-app-main-caret");
        const waitCaret = document.getElementById("f01-idea-to-app-wait-caret");
        const textDriver = { t: 0 };
        const blinkDriver = { p: 0 };
        const tl = gsap.timeline({ paused: true });

        tl.fromTo(
          "#f01-idea-to-app-diagonal",
          { x: 120, opacity: 0.45 },
          { x: 0, opacity: 1, duration: 1.1, ease: "expo.out" },
          0.1
        );
        tl.fromTo(
          ".dot-field span",
          { opacity: 0, scale: 0.2 },
          { opacity: 1, scale: 1, duration: 0.36, stagger: 0.035, ease: "power4.out" },
          0.14
        );
        tl.fromTo(
          "#f01-idea-to-app-idea-stage",
          { opacity: 0.72, y: 18 },
          { opacity: 1, y: 0, duration: 0.42, ease: "power3.out" },
          0.12
        );
        tl.fromTo(
          "#f01-idea-to-app-accent",
          { scaleX: 0 },
          { scaleX: 1, duration: 0.5, ease: "power3.out", transformOrigin: "left center" },
          0.12
        );
        tl.fromTo(
          "#f01-idea-to-app-eyebrow",
          { opacity: 0, y: 10 },
          { opacity: 1, y: 0, duration: 0.42, ease: "power4.out" },
          0.22
        );

        tl.to(
          textDriver,
          {
            t: DURATION,
            duration: DURATION,
            ease: "none",
            onUpdate: () => {
              const ideaEntry = entryAt(ideaSequence, textDriver.t);
              const waitEntry = entryAt(waitSequence, textDriver.t);
              ideaText.textContent = ideaEntry.text;
              waitText.textContent = waitEntry.text;
              mainCaret.style.background = ideaEntry.color;
            }
          },
          0
        );
        tl.to(
          blinkDriver,
          {
            p: Math.PI * 2 * 6,
            duration: DURATION,
            ease: "none",
            onUpdate: () => {
              const blinkOn = Math.sin(blinkDriver.p) > -0.2;
              mainCaret.style.opacity = textDriver.t < 3.28 && blinkOn ? "1" : "0";
              waitCaret.style.opacity = textDriver.t >= 1.86 && textDriver.t < 2.82 && blinkOn ? "1" : "0";
            }
          },
          0
        );

        tl.fromTo(
          "#f01-idea-to-app-wait-stage",
          { opacity: 0, x: 48 },
          { opacity: 1, x: 0, duration: 0.5, ease: "expo.out" },
          1.78
        );
        tl.to(
          "#f01-idea-to-app-idea-stage",
          { x: 244, y: 116, scale: 0.64, duration: 0.72, ease: "power3.inOut" },
          1.72
        );
        tl.fromTo(
          "#f01-idea-to-app-prompt",
          { opacity: 0, y: 28, scale: 0.96, filter: "blur(10px)" },
          { opacity: 0.78, y: 0, scale: 1, filter: "blur(0px)", duration: 0.78, ease: "expo.out" },
          2.02
        );
        tl.fromTo(
          "#f01-idea-to-app-product-window",
          { opacity: 0, scale: 0.84, filter: "blur(18px)" },
          { opacity: 0.24, scale: 0.9, filter: "blur(5px)", duration: 0.78, ease: "power3.out" },
          2.1
        );
        tl.fromTo(
          "#f01-idea-to-app-marker",
          { strokeDasharray: 520, strokeDashoffset: 520 },
          { strokeDashoffset: 0, duration: 0.52, ease: "power2.out" },
          2.48
        );

        tl.to(
          ["#f01-idea-to-app-idea-stage", "#f01-idea-to-app-wait-stage", "#f01-idea-to-app-prompt"],
          { scale: 0.68, opacity: 0, filter: "blur(10px)", duration: 0.36, ease: "power2.in" },
          3.22
        );
        tl.to(
          "#f01-idea-to-app-product-window",
          { opacity: 1, scale: 1, filter: "blur(0px)", duration: 0.68, ease: "expo.out" },
          3.35
        );
        tl.fromTo(
          ".app-reveal",
          { opacity: 0, y: 18 },
          { opacity: 1, y: 0, duration: 0.48, stagger: 0.075, ease: "power4.out" },
          3.52
        );
        tl.fromTo(
          "#f01-idea-to-app-specular",
          { x: 0, opacity: 0 },
          { x: 1760, opacity: 0.72, duration: 0.72, ease: "power2.inOut" },
          3.58
        );
        tl.fromTo(
          "#f01-idea-to-app-progress",
          { scaleX: 0.18 },
          { scaleX: 1, duration: 1.02, ease: "power3.out", transformOrigin: "left center" },
          3.48
        );

        window.__timelines["01-idea-to-app"] = tl;
      </script>
    </template>
  </body>
</html>
