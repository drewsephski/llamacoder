      <script>
        (() => {
          window.__timelines = window.__timelines || {};

          const root = document.getElementById("root");
          const q = (selector) => root.querySelector(selector);
          const GLYPHS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#%&*";

          function pseudoGlyph(seed) {
            const h = ((seed * 9301 + 49297) % 233280) / 233280;
            return GLYPHS[Math.floor(h * GLYPHS.length)];
          }

          function buildFlipLabel(selector) {
            const wrap = q(selector);
            const target = wrap.dataset.target;
            const ghost = document.createElement("span");
            ghost.className = "flip-ghost";
            ghost.textContent = target;
            const live = document.createElement("span");
            live.className = "flip-live";
            const chars = [];
            for (const ch of target) {
              const span = document.createElement("span");
              span.className = "flip-char";
              span.dataset.target = ch;
              span.textContent = ch === " " ? "\u00a0" : ch;
              live.appendChild(span);
              chars.push(span);
            }
            wrap.appendChild(ghost);
            wrap.appendChild(live);
            return chars;
          }

          const safeChars = buildFlipLabel("#f05-safe-label");
          const setupChars = buildFlipLabel("#f05-setup-label");
          const blockedChars = buildFlipLabel("#f05-blocked-label");

          const boundary = q("#f05-boundary");
          const boundaryLength = boundary.getTotalLength();
          boundary.style.strokeDasharray = `${boundaryLength}`;
          boundary.style.strokeDashoffset = `${boundaryLength}`;

          const tl = gsap.timeline({ paused: true });

          tl.fromTo(
            "#f05-topbar",
            { y: -24, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.48, ease: "power3.out" },
            0.02,
          );

          tl.fromTo(
            "#f05-beam",
            { x: -70, scaleX: 0.35, opacity: 0 },
            { x: 330, scaleX: 1, opacity: 1, duration: 1.6, ease: "power2.inOut" },
            0.12,
          );

          const stampSequence = [
            { t: 0, values: ["PENDING", "PENDING", "PENDING"] },
            { t: 0.54, values: ["CHECKING…", "PENDING", "PENDING"] },
            { t: 0.92, values: ["VERIFIED · TODAY", "CHECKING…", "PENDING"] },
            { t: 1.34, values: ["VERIFIED · TODAY", "CURRENT · TODAY", "CHECKING…"] },
            { t: 1.76, values: ["VERIFIED · TODAY", "CURRENT · TODAY", "FRESH · CONFIRMED"] },
          ];
          const stampDriver = { t: 0 };
          tl.to(
            stampDriver,
            {
              t: 2.02,
              duration: 2.02,
              ease: "none",
              onUpdate: () => {
                let state = stampSequence[0];
                for (let i = stampSequence.length - 1; i >= 0; i -= 1) {
                  if (stampDriver.t >= stampSequence[i].t) {
                    state = stampSequence[i];
                    break;
                  }
                }
                q("#f05-stamp-1").textContent = state.values[0];
                q("#f05-stamp-2").textContent = state.values[1];
                q("#f05-stamp-3").textContent = state.values[2];
              },
            },
            0,
          );

          tl.fromTo(
            "#f05-safe",
            { x: -520, rotateY: 68, scale: 0.88, opacity: 0 },
            { x: 0, rotateY: 0, scale: 1, opacity: 1, duration: 0.92, ease: "power3.out" },
            2.03,
          );
          tl.fromTo(
            "#f05-setup",
            { x: 520, rotateY: -68, scale: 0.88, opacity: 0 },
            { x: 0, rotateY: 0, scale: 1, opacity: 1, duration: 0.92, ease: "power3.out" },
            2.22,
          );

          function addHackerFlip(chars, start) {
            chars.forEach((el, i) => {
              const state = { p: 0 };
              tl.to(
                state,
                {
                  p: 1,
                  duration: 0.55,
                  ease: "power3.out",
                  onUpdate: () => {
                    const progress = state.p;
                    const target = el.dataset.target;
                    if (target === " ") {
                      el.textContent = "\u00a0";
                    } else if (progress < 0.6) {
                      el.textContent = pseudoGlyph(i * 1000 + Math.floor(progress * 20));
                    } else {
                      el.textContent = target;
                    }
                    el.style.transform = `rotateX(${90 - progress * 90}deg)`;
                    el.style.opacity = Math.min(1, progress * 2);
                  },
                },
                start + i * 0.036,
              );
            });
          }

          addHackerFlip(safeChars, 2.48);
          addHackerFlip(setupChars, 2.7);

          tl.fromTo(
            "#f05-blocked",
            { scale: 0, opacity: 0, y: 16 },
            { scale: 1, opacity: 1, y: 0, duration: 0.55, ease: "power3.out" },
            5.08,
          );
          addHackerFlip(blockedChars, 5.2);

          ["#f05-public-api", "#f05-secret-key", "#f05-side-effect"].forEach((selector, i) => {
            tl.fromTo(
              selector,
              { scale: 0, opacity: 0, y: 18 },
              { scale: 1, opacity: 1, y: 0, duration: 0.56, ease: "power3.out" },
              5.48 + i * 0.34,
            );
          });

          tl.to(
            "#f05-boundary",
            { strokeDashoffset: 0, duration: 0.92, ease: "power2.out" },
            6.92,
          );
          tl.fromTo(
            "#f05-boundary-tag",
            { scale: 0, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.45, ease: "power3.out" },
            7.62,
          );

          window.__timelines["05-research-policy"] = tl;
        })();
      </script>
