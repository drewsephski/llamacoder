      <script>
        window.__timelines = window.__timelines || {};

        const frameRoot = document.querySelector('[data-composition-id="04-intent-router"]');
        const tl = gsap.timeline({ paused: true });
        const hero = document.getElementById("f04-intent-router-hero");
        const inputPath = document.getElementById("f04-intent-router-input");
        const generateInPath = document.getElementById("f04-intent-router-path-generate-in");
        const generateOutPath = document.getElementById("f04-intent-router-path-generate-out");
        const routePaths = Array.from(frameRoot.querySelectorAll(".route-path"));
        const routeNodes = Array.from(frameRoot.querySelectorAll(".route-node"));
        const latch = frameRoot.querySelector(".approval-latch");
        const approved = frameRoot.querySelector(".approved-token");

        [inputPath, ...routePaths].forEach((path) => {
          const length = path.getTotalLength();
          path.style.strokeDasharray = String(length);
          path.style.strokeDashoffset = String(length);
        });

        tl.fromTo(
          hero,
          { scale: 0, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.58, ease: "power3.out" },
          0.04,
        );
        tl.fromTo(
          ".input-token",
          { x: -230, opacity: 0.3 },
          { x: 0, opacity: 1, duration: 0.7, ease: "power3.out" },
          0.18,
        );
        tl.to(inputPath, { strokeDashoffset: 0, duration: 0.82, ease: "power2.out" }, 0.44);

        const routeCues = [1.65, 2.25, 2.85, 3.45, 4.05, 4.65];
        routeNodes.forEach((node, index) => {
          const path = routePaths[index];
          tl.fromTo(
            node,
            { scale: 0.92, opacity: 0.16, y: 16 },
            { scale: 1, opacity: 1, y: 0, duration: 0.48, ease: "power3.out" },
            routeCues[index],
          );
          tl.to(
            path,
            { strokeDashoffset: 0, duration: 0.52, ease: "power2.out" },
            routeCues[index] + 0.08,
          );
        });

        tl.fromTo(
          latch,
          { x: 250, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.56, ease: "power4.out" },
          5.46,
        );
        tl.to(
          generateInPath,
          { strokeWidth: 7, duration: 0.28, ease: "power2.out" },
          5.3,
        );
        tl.fromTo(
          approved,
          { y: -92, scale: 0.72, opacity: 0 },
          { y: 0, scale: 1, opacity: 1, duration: 0.48, ease: "power3.out" },
          7.02,
        );
        tl.to(
          generateOutPath,
          { strokeDashoffset: 0, duration: 0.56, ease: "power2.out" },
          7.34,
        );
        tl.to(latch, { scaleX: 1.035, duration: 0.18, ease: "power2.out" }, 7.08);
        tl.to(latch, { scaleX: 1, duration: 0.24, ease: "power2.out" }, 7.26);

        window.__timelines["04-intent-router"] = tl;
