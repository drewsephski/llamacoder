      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });
        const imageWorld = document.getElementById("f02-meet-squid-image-world");
        const camera = { scale: 1.45, x: -18, y: -34 };

        function applyCamera() {
          imageWorld.style.transform =
            `translate(${camera.x}px, ${camera.y}px) scale(${camera.scale})`;
        }

        applyCamera();

        // Scene 1 — the real workspace arrives as a tilted editorial plate.
        tl.fromTo(
          "#f02-meet-squid-stage",
          { opacity: 0.18, scale: 0.94, y: 28, rotation: -1.4 },
          {
            opacity: 1,
            scale: 1,
            y: 0,
            rotation: -0.4,
            duration: 0.68,
            ease: "power3.out",
          },
          0,
        );
        tl.fromTo(
          "#f02-meet-squid-chrome",
          { opacity: 0, x: -42 },
          { opacity: 1, x: 0, duration: 0.58, ease: "power3.out" },
          0.18,
        );
        tl.fromTo(
          "#f02-meet-squid-cursor",
          { opacity: 0, x: 170, y: 90, scale: 0.82 },
          {
            opacity: 1,
            x: -710,
            y: -372,
            scale: 1,
            duration: 1.18,
            ease: "power3.out",
          },
          0.22,
        );

        // Scene 2 — cursor and virtual camera lock to the plain-language region.
        tl.to(
          camera,
          {
            scale: 1.68,
            x: -52,
            y: -74,
            duration: 0.92,
            ease: "power3.inOut",
            onUpdate: applyCamera,
          },
          1.5,
        );
        tl.fromTo(
          "#f02-meet-squid-focus-box",
          { opacity: 0, scale: 0.82 },
          { opacity: 1, scale: 1, duration: 0.48, ease: "power3.out" },
          2.05,
        );
        tl.to(
          "#f02-meet-squid-cursor",
          { scale: 0.84, duration: 0.08, ease: "power2.in" },
          2.28,
        );
        tl.to(
          "#f02-meet-squid-cursor",
          { scale: 1, duration: 0.1, ease: "power2.out" },
          2.36,
        );
        tl.fromTo(
          "#f02-meet-squid-ripple",
          { opacity: 0, scale: 0 },
          { opacity: 0.72, scale: 0.62, duration: 0.1, ease: "power2.out" },
          2.3,
        );
        tl.to(
          "#f02-meet-squid-ripple",
          { opacity: 0, scale: 3.4, duration: 0.62, ease: "power3.out" },
          2.4,
        );

        // Scene 3 — reference inputs sequence, then the camera opens onto the journey.
        const referenceSequence = [
          { selector: "#f02-meet-squid-reference-screenshot", text: "SCREENSHOT", hold: 0.25 },
          { selector: "#f02-meet-squid-reference-website", text: "WEBSITE", hold: 0.3 },
        ];
        let referenceStart = 3.42;
        referenceSequence.forEach((item) => {
          tl.fromTo(
            item.selector,
            { opacity: 0, x: 42 },
            { opacity: 1, x: 0, duration: 0.38, ease: "power3.out" },
            referenceStart,
          );
          referenceStart += 0.34 + item.text.length * 0.018 + item.hold;
        });
        tl.to(
          camera,
          {
            scale: 1.27,
            x: -12,
            y: -22,
            duration: 1.08,
            ease: "power3.inOut",
            onUpdate: applyCamera,
          },
          4.1,
        );

        [
          "#f02-meet-squid-marker-research",
          "#f02-meet-squid-marker-plan",
          "#f02-meet-squid-marker-build",
        ].forEach((selector, index) => {
          tl.fromTo(
            selector,
            { opacity: 0, scale: 0 },
            { opacity: 1, scale: 1, duration: 0.46, ease: "power3.out" },
            4.58 + index * 0.28,
          );
        });

        // Scene 4 — complete workspace and journey settle; the proof rail fills.
        tl.to(
          camera,
          {
            scale: 1.12,
            x: 0,
            y: -18,
            duration: 0.9,
            ease: "power3.inOut",
            onUpdate: applyCamera,
          },
          5.72,
        );
        tl.fromTo(
          "#f02-meet-squid-proof-rail",
          { opacity: 0, y: -18 },
          { opacity: 1, y: 0, duration: 0.38, ease: "power3.out" },
          5.86,
        );
        tl.fromTo(
          "#f02-meet-squid-proof-fill",
          { scaleX: 0 },
          { scaleX: 1, duration: 0.94, ease: "power3.inOut" },
          5.98,
        );
        tl.fromTo(
          "#f02-meet-squid-proof-label",
          { opacity: 0 },
          { opacity: 1, duration: 0.38, ease: "power2.out" },
          6.46,
        );

        window.__timelines["02-meet-squid"] = tl;
      </script>
