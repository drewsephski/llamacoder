      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });
        const byId = (id) => document.getElementById(id);

        const editorCrop = byId("f05-visible-quality-editor-crop");
        const reportCrop = byId("f05-visible-quality-report-crop");
        const brokenLabel = byId("f05-visible-quality-broken-label");
        const diagnosticSweep = byId("f05-visible-quality-diagnostic-sweep");
        const checkFiles = byId("f05-visible-quality-check-files");
        const checkAccessibility = byId("f05-visible-quality-check-accessibility");
        const statFiles = byId("f05-visible-quality-stat-files");
        const statImports = byId("f05-visible-quality-stat-imports");
        const statCredits = byId("f05-visible-quality-stat-credits");
        const payoff = byId("f05-visible-quality-payoff");
        const payoffText = byId("f05-visible-quality-payoff-text");
        const payoffCursor = byId("f05-visible-quality-payoff-cursor");
        const verifiedRail = byId("f05-visible-quality-verified-rail");
        const verifiedFill = byId("f05-visible-quality-verified-fill");
        const verifiedLabel = byId("f05-visible-quality-verified-label");

        tl.set(reportCrop, { opacity: 0, scale: 0.72, x: 240 }, 0);
        tl.set([checkFiles, checkAccessibility], { opacity: 0, x: 150 }, 0);
        tl.set([statFiles, statImports, statCredits], { opacity: 0, y: 34, scale: 0.94 }, 0);
        tl.set(payoff, { opacity: 0, y: -24 }, 0);
        tl.set(verifiedRail, { opacity: 0 }, 0);
        tl.set(verifiedFill, { scaleX: 0 }, 0);
        tl.set(verifiedLabel, { opacity: 0 }, 0);
        tl.set(diagnosticSweep, { opacity: 0, x: -920, scaleX: 0.2 }, 0);

        // Scene 1 — exact JSX repair line under a restrained diagnostic sweep.
        tl.fromTo(
          editorCrop,
          { opacity: 0.24, scale: 0.97, y: 16 },
          { opacity: 1, scale: 1, y: 0, duration: 0.58, ease: "power3.out" },
          0,
        );

        const glowDriver = { t: 0 };
        tl.to(
          glowDriver,
          {
            t: 1.8,
            duration: 1.8,
            ease: "none",
            onUpdate: () => {
              const time = glowDriver.t;
              const attack = Math.max(0, Math.min(1, (time - 0.18) / 0.2));
              const release = time < 1.18 ? 1 : Math.max(0.16, 1 - (time - 1.18) / 0.46);
              const envelope = attack * release;
              brokenLabel.style.opacity = String(0.22 + envelope * 0.78);
              brokenLabel.style.transform = "scale(" + (1 + envelope * 0.05) + ")";
              brokenLabel.style.textShadow =
                "0 0 " + (18 * envelope) + "px rgba(0,98,255," + (0.18 + envelope * 0.52) + ")";
            },
          },
          0,
        );

        tl.to(
          diagnosticSweep,
          {
            opacity: 1,
            x: 980,
            scaleX: 0.92,
            duration: 1.08,
            ease: "power3.inOut",
          },
          0.34,
        );
        tl.to(
          diagnosticSweep,
          { opacity: 0.12, duration: 0.22, ease: "power2.out" },
          1.48,
        );

        // Scene 2 — cut-the-curve and same-anchor scale swap into the report.
        tl.to(
          editorCrop,
          {
            x: -430,
            scale: 0.72,
            opacity: 0.34,
            duration: 0.46,
            ease: "power4.in",
          },
          1.8,
        );
        tl.to(
          reportCrop,
          {
            x: 0,
            scale: 1,
            opacity: 1,
            duration: 0.62,
            ease: "power4.out",
          },
          2.06,
        );
        tl.to(
          checkFiles,
          { opacity: 1, x: 0, duration: 0.42, ease: "power3.out" },
          2.72,
        );
        tl.to(
          checkAccessibility,
          { opacity: 1, x: 0, duration: 0.42, ease: "power3.out" },
          3.46,
        );

        // Scene 3 — report becomes the hero and source-backed counters sequence.
        tl.to(
          reportCrop,
          {
            scale: 1.06,
            x: -36,
            y: -14,
            duration: 0.72,
            ease: "power3.inOut",
          },
          4.3,
        );

        const proofSequence = [
          { element: statFiles, text: "FILES", hold: 0.12 },
          { element: statImports, text: "IMPORTS RESOLVED", hold: 0.14 },
          { element: statCredits, text: "CREDITS CHARGED", hold: 0.22 },
        ];
        let proofStart = 4.4;
        proofSequence.forEach((item) => {
          tl.to(
            item.element,
            {
              opacity: 1,
              y: 0,
              scale: 1,
              duration: 0.5,
              ease: "power3.out",
            },
            proofStart,
          );
          proofStart += 0.28 + item.text.length * 0.011 + item.hold;
        });

        // Scene 4 — type the payoff, close the verified rail, then hold still.
        const payoffCopy = "shows you what passed";
        const typeDriver = { chars: 0 };
        tl.to(
          payoff,
          { opacity: 1, y: 0, duration: 0.34, ease: "power3.out" },
          6.6,
        );
        tl.to(
          typeDriver,
          {
            chars: payoffCopy.length,
            duration: 0.78,
            ease: "none",
            onUpdate: () => {
              payoffText.textContent = payoffCopy.slice(0, Math.floor(typeDriver.chars));
            },
          },
          6.62,
        );
        tl.to(
          verifiedRail,
          { opacity: 1, duration: 0.24, ease: "power2.out" },
          7.02,
        );
        tl.to(
          verifiedFill,
          { scaleX: 1, duration: 0.56, ease: "power3.inOut" },
          7.08,
        );
        tl.to(
          verifiedLabel,
          { opacity: 1, duration: 0.28, ease: "power2.out" },
          7.38,
        );
        tl.to(
          payoffCursor,
          { opacity: 0, duration: 0.12, ease: "none" },
          7.64,
        );

        window.__timelines["05-visible-quality"] = tl;
      </script>
