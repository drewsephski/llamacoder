      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });
        const world = document.getElementById("f06-focused-edit-world");
        const instructionText = document.getElementById("f06-focused-edit-instruction-text");
        const typingCaret = document.getElementById("f06-focused-edit-typing-caret");
        const cam = { scale: 1, x: 0, y: 0 };

        function applyCamera() {
          world.style.transform = `translate(${cam.x}px, ${cam.y}px) scale(${cam.scale})`;
        }

        applyCamera();

        tl.set("#f06-focused-edit-surface", { "--dof": "0px", opacity: 1 }, 0);
        tl.set("#f06-focused-edit-track-box", { opacity: 0, scale: 0.76 }, 0);
        tl.set(".f06-focused-edit-ripple", { opacity: 0, scale: 0.3 }, 0);
        tl.set("#f06-focused-edit-code-before", { opacity: 1, scale: 1 }, 0);
        tl.set("#f06-focused-edit-code-after", { opacity: 0, scale: 0.72 }, 0);
        tl.set("#f06-focused-edit-changed-bar", { opacity: 0, scaleY: 0 }, 0);
        tl.set("#f06-focused-edit-instruction", { opacity: 0, y: 20 }, 0);
        tl.set(".f06-focused-edit-pin", { "--dof": "0px", opacity: 0 }, 0);
        tl.set(".f06-focused-edit-preserve", { opacity: 0 }, 0);
        tl.set("#f06-focused-edit-cursor", { opacity: 0, x: 1810, y: 180, scale: 1 }, 0);
        tl.set("#f06-focused-edit-final-title", { opacity: 0, scale: 1.25, filter: "blur(10px)" }, 0);

        // Scene 1 — Cursor selects one exact code region, then the tracking brackets lock on.
        tl.fromTo(
          "#f06-focused-edit-question",
          { opacity: 0, y: 14 },
          { opacity: 1, y: 0, duration: 0.48, ease: "power3.out" },
          0.08,
        );
        tl.fromTo(
          "#f06-focused-edit-cursor",
          { opacity: 0, x: 1810, y: 180, scale: 1 },
          { opacity: 1, x: 1530, y: 756, scale: 1, duration: 0.72, ease: "power2.inOut" },
          0.12,
        );
        tl.to(
          "#f06-focused-edit-cursor",
          { scale: 0.84, duration: 0.09, ease: "power2.in" },
          0.91,
        );
        tl.to(
          "#f06-focused-edit-cursor",
          { scale: 1, duration: 0.14, ease: "power2.out" },
          1.0,
        );
        tl.fromTo(
          ".f06-focused-edit-ripple",
          { opacity: 0.72, scale: 0.3 },
          {
            opacity: 0,
            scale: 4.5,
            duration: 0.62,
            ease: "power2.out",
            stagger: 0.08,
            immediateRender: false,
          },
          0.92,
        );
        tl.fromTo(
          "#f06-focused-edit-track-box",
          { opacity: 0, scale: 0.76 },
          { opacity: 1, scale: 1, duration: 0.46, ease: "power3.out" },
          1.02,
        );

        // Scene 2 — Camera chases the selection; instruction types while preserved edges stay pinned.
        tl.to(
          cam,
          {
            scale: 1.16,
            x: -110,
            y: -85,
            duration: 0.82,
            ease: "power3.inOut",
            onUpdate: applyCamera,
          },
          1.6,
        );
        tl.to(
          "#f06-focused-edit-cursor",
          { x: 1448, y: 710, duration: 0.82, ease: "power3.inOut" },
          1.6,
        );
        tl.to(
          "#f06-focused-edit-surface",
          { "--dof": "3px", opacity: 0.5, duration: 0.72, ease: "power2.inOut" },
          1.62,
        );
        tl.fromTo(
          "#f06-focused-edit-instruction",
          { opacity: 0, y: 20 },
          { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" },
          1.72,
        );
        tl.fromTo(
          ".f06-focused-edit-pin",
          { opacity: 0, "--dof": "6px" },
          { opacity: 0.48, "--dof": "1px", duration: 0.72, ease: "power2.inOut" },
          1.78,
        );

        const instructionSequence = [
          { t: 0, text: "" },
          { t: 0.16, text: "Make" },
          { t: 0.39, text: "Make the trend" },
          { t: 0.69, text: "Make the trend icon" },
          { t: 1.02, text: "Make the trend icon blue." },
        ];

        function instructionAt(time) {
          for (let i = instructionSequence.length - 1; i >= 0; i -= 1) {
            if (time >= instructionSequence[i].t) return instructionSequence[i].text;
          }
          return "";
        }

        const instructionDriver = { t: 0 };
        tl.to(
          instructionDriver,
          {
            t: 1.4,
            duration: 1.4,
            ease: "none",
            onUpdate: () => {
              instructionText.textContent = instructionAt(instructionDriver.t);
            },
          },
          1.86,
        );

        const blinkDriver = { p: 0 };
        tl.to(
          blinkDriver,
          {
            p: Math.PI * 2 * 3,
            duration: 1.8,
            ease: "none",
            onUpdate: () => {
              typingCaret.style.opacity = Math.sin(blinkDriver.p) > 0 ? "1" : "0";
            },
          },
          1.82,
        );

        // Scene 3 — UPDATE compresses with the cursor; only the same anchored code line swaps.
        tl.to(
          "#f06-focused-edit-cursor",
          { x: 1692, y: 214, duration: 0.36, ease: "power2.inOut" },
          3.6,
        );
        tl.to(
          ["#f06-focused-edit-update", "#f06-focused-edit-cursor"],
          { scale: 0.92, duration: 0.15, ease: "power1.in" },
          3.96,
        );
        tl.to(
          "#f06-focused-edit-update",
          { backgroundColor: "#0062ff", duration: 0.15, ease: "power1.in" },
          3.96,
        );
        tl.to(
          ["#f06-focused-edit-update", "#f06-focused-edit-cursor"],
          { scale: 1, duration: 0.48, ease: "power3.out" },
          4.13,
        );
        tl.to(
          "#f06-focused-edit-code-before",
          { scale: 0.72, opacity: 0, duration: 0.35, ease: "power2.in" },
          4.16,
        );
        tl.fromTo(
          "#f06-focused-edit-code-after",
          { scale: 0.72, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.55, ease: "power3.out" },
          4.36,
        );
        tl.fromTo(
          "#f06-focused-edit-changed-bar",
          { opacity: 0, scaleY: 0 },
          { opacity: 1, scaleY: 1, duration: 0.46, ease: "power2.out" },
          4.72,
        );

        // Scene 4 — Pull back once, refocus the full UI, and illuminate preserved regions in place.
        tl.to(
          cam,
          {
            scale: 1,
            x: 0,
            y: 0,
            duration: 0.96,
            ease: "power3.inOut",
            onUpdate: applyCamera,
          },
