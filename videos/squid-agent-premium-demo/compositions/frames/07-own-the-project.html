      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });
        const byId = (id) => document.getElementById(id);

        const world = byId("f07-own-the-project-world");
        const image = byId("f07-own-the-project-image");
        const chrome = byId("f07-own-the-project-chrome");
        const connectorOne = byId("f07-own-the-project-connector-one");
        const connectorTwo = byId("f07-own-the-project-connector-two");
        const actionShare = byId("f07-own-the-project-action-share");
        const actionRemix = byId("f07-own-the-project-action-remix");
        const actionDownload = byId("f07-own-the-project-action-download");
        const actionShareLine = byId("f07-own-the-project-action-share-line");
        const actionRemixLine = byId("f07-own-the-project-action-remix-line");
        const actionDownloadLine = byId("f07-own-the-project-action-download-line");
        const artifactSource = byId("f07-own-the-project-artifact-source");
        const artifactSetup = byId("f07-own-the-project-artifact-setup");
        const artifactQuality = byId("f07-own-the-project-artifact-quality");
        const artifactZip = byId("f07-own-the-project-artifact-zip");
        const checkSource = byId("f07-own-the-project-check-source");
        const checkSetup = byId("f07-own-the-project-check-setup");
        const checkQuality = byId("f07-own-the-project-check-quality");
        const checkZip = byId("f07-own-the-project-check-zip");
        const deployVercel = byId("f07-own-the-project-deploy-vercel");
        const deployNetlify = byId("f07-own-the-project-deploy-netlify");
        const deployCloudflare = byId("f07-own-the-project-deploy-cloudflare");
        const payoff = byId("f07-own-the-project-payoff");

        const camera = { scale: 1.24, x: -72, y: -34 };

        function applyCamera() {
          world.style.transform =
            "translate(" + camera.x + "px, " + camera.y + "px) scale(" + camera.scale + ")";
        }

        function preparePath(path) {
          const length = path.getTotalLength();
          path.style.strokeDasharray = String(length);
          path.style.strokeDashoffset = String(length);
        }

        applyCamera();
        [connectorOne, connectorTwo, checkSource, checkSetup, checkQuality, checkZip].forEach(
          preparePath,
        );

        tl.set([actionShareLine, actionRemixLine, actionDownloadLine], { scaleX: 0 }, 0);
        tl.set(
          [artifactSource, artifactSetup, artifactQuality, artifactZip],
          { opacity: 0, x: 38 },
          0,
        );
        tl.set(
          [deployVercel, deployNetlify, deployCloudflare],
          { opacity: 0.24, y: 18 },
          0,
        );
        tl.set(payoff, { opacity: 0, y: -28 }, 0);

        // Scene 1 — finished app/source pair and connector rails establish ownership.
        tl.fromTo(
          image,
          { opacity: 0.22, scale: 0.98 },
          { opacity: 1, scale: 1, duration: 0.56, ease: "power3.out" },
          0,
        );
        tl.fromTo(
          chrome,
          { opacity: 0, x: -30 },
          { opacity: 1, x: 0, duration: 0.5, ease: "power3.out" },
          0.18,
        );
        tl.to(
          connectorOne,
          { strokeDashoffset: 0, duration: 0.72, ease: "power2.out" },
          0.42,
        );
        tl.to(
          connectorTwo,
          { strokeDashoffset: 0, duration: 0.72, ease: "power2.out" },
          0.78,
        );

        // Scene 2 — action rail accumulates one spoken cue at a time.
        const actionSequence = [
          { element: actionShare, line: actionShareLine, text: "SHARE", hold: 0.16 },
          { element: actionRemix, line: actionRemixLine, text: "REMIX", hold: 0.16 },
          { element: actionDownload, line: actionDownloadLine, text: "DOWNLOAD", hold: 0.28 },
        ];
        let actionStart = 2.04;
        actionSequence.forEach((item) => {
          tl.to(
            item.element,
            {
              opacity: 1,
              color: "#f8fafc",
              duration: 0.34,
              ease: "power3.out",
            },
            actionStart,
          );
          tl.to(
            item.line,
            { scaleX: 1, duration: 0.42, ease: "power3.out" },
            actionStart + 0.06,
          );
          actionStart += 0.38 + item.text.length * 0.022 + item.hold;
        });

        tl.to(
          camera,
          {
            scale: 1.3,
            x: -132,
            y: -52,
            duration: 0.82,
            ease: "power3.inOut",
            onUpdate: applyCamera,
          },
          3.24,
        );

        // Scene 3 — download focus reveals the exact supplied bundle artifacts.
        tl.to(
          actionDownload,
          {
            backgroundColor: "#0062ff",
            color: "#07090d",
            duration: 0.36,
            ease: "power2.out",
          },
          4.6,
        );
        tl.to(
          camera,
          {
            scale: 1.25,
            x: -172,
            y: -18,
            duration: 0.9,
            ease: "power3.inOut",
            onUpdate: applyCamera,
          },
          4.64,
        );

        const artifactSequence = [
          { element: artifactSource, path: checkSource, text: "SOURCE", hold: 0.1 },
          { element: artifactSetup, path: checkSetup, text: "SETUP", hold: 0.1 },
          { element: artifactQuality, path: checkQuality, text: "QUALITY", hold: 0.1 },
          { element: artifactZip, path: checkZip, text: "ZIP", hold: 0.2 },
        ];
        let artifactStart = 4.78;
        artifactSequence.forEach((item) => {
          tl.to(
            item.element,
            { opacity: 1, x: 0, duration: 0.38, ease: "power3.out" },
            artifactStart,
          );
          tl.to(
            item.path,
            { strokeDashoffset: 0, duration: 0.36, ease: "power2.out" },
            artifactStart + 0.12,
          );
          artifactStart += 0.3 + item.text.length * 0.025 + item.hold;
        });

        // Scene 4 — deploy rail resolves as the camera reveals the whole ownership world.
        tl.to(
          camera,
          {
            scale: 1,
            x: 0,
            y: 0,
            duration: 0.96,
            ease: "power3.inOut",
            onUpdate: applyCamera,
          },
          7.2,
        );

        const deploymentSequence = [
          { element: deployVercel, text: "VERCEL", hold: 0.08 },
          { element: deployNetlify, text: "NETLIFY", hold: 0.08 },
          { element: deployCloudflare, text: "CLOUDFLARE", hold: 0.18 },
        ];
        let deploymentStart = 7.28;
        deploymentSequence.forEach((item) => {
          tl.to(
            item.element,
            {
              opacity: 1,
              y: 0,
              color: "#f8fafc",
              duration: 0.38,
              ease: "power3.out",
            },
            deploymentStart,
          );
          deploymentStart += 0.28 + item.text.length * 0.018 + item.hold;
        });

        tl.to(
          payoff,
          { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" },
          7.92,
        );

        window.__timelines["07-own-the-project"] = tl;
      </script>
