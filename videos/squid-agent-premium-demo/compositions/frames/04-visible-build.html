      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const approved = document.getElementById("f04-visible-build-approved");
        const surface = document.getElementById("f04-visible-build-surface");
        const editorView = document.getElementById("f04-visible-build-view-editor");
        const buildView = document.getElementById("f04-visible-build-view-build");
        const editorBase = document.getElementById("f04-visible-build-editor-base");
        const buildBase = document.getElementById("f04-visible-build-build-base");
        const workflowCrop = document.getElementById("f04-visible-build-workflow-crop");
        const editorCrop = document.getElementById("f04-visible-build-editor-crop");
        const filetreeCrop = document.getElementById("f04-visible-build-filetree-crop");
        const researchHighlight = document.getElementById("f04-visible-build-research-highlight");
        const planHighlight = document.getElementById("f04-visible-build-plan-highlight");
        const activeLine = document.getElementById("f04-visible-build-active-line");
        const activeLineLabel = document.getElementById("f04-visible-build-active-line-label");
        const componentsCallout = document.getElementById("f04-visible-build-callout-components");
        const interactionsCallout = document.getElementById("f04-visible-build-callout-interactions");
        const together = document.getElementById("f04-visible-build-together");
        const fileRows = Array.from(
          document.querySelectorAll('[class~="04-visible-build-file-row"]'),
        );

        const lineContent = [
          { key: "props", label: "props / interface", y: 232, body: "MetricCardProps" },
          { key: "state", label: "state / function", y: 522, body: "MetricCard function" },
          { key: "render", label: "render / component", y: 696, body: "React component" },
        ];
        const sequenceStart = 1.82;
        const baseDuration = 0.25;
        const secondsPerCharacter = 0.012;
        const itemHold = 0.18;
        let cumulative = sequenceStart;
        const lineTimeline = lineContent.map((entry) => {
          const duration = baseDuration + entry.body.length * secondsPerCharacter + itemHold;
          const start = cumulative;
          cumulative += duration;
          return { ...entry, start, end: cumulative };
        });

        function lineAt(time) {
          if (time < sequenceStart) return null;
          for (let i = lineTimeline.length - 1; i >= 0; i -= 1) {
            if (time >= lineTimeline[i].start) return lineTimeline[i];
          }
          return null;
        }

        function lineEnvelope(time, entry) {
          const attackDuration = 0.16;
          const releaseDuration = 0.2;
          const sustainEnd = Math.max(entry.start + attackDuration, entry.end - releaseDuration);
          if (time < entry.start) return 0;
          if (time < entry.start + attackDuration) {
            return (time - entry.start) / attackDuration;
          }
          if (time < sustainEnd) return 1;
          if (time < entry.end) {
            return 1 - ((time - sustainEnd) / (entry.end - sustainEnd)) * 0.82;
          }
          return 0.18;
        }

        const driver = { t: 0 };
        let lastLineKey = "";
        const timeline = gsap.timeline({ paused: true });

        timeline.to(
          driver,
          {
            t: 7.837,
            duration: 7.837,
            ease: "none",
            onUpdate: () => {
              const entry = lineAt(driver.t);
              if (!entry) {
                activeLine.style.opacity = "0";
                activeLineLabel.textContent = "";
                lastLineKey = "";
                return;
              }

              if (entry.key !== lastLineKey) {
                activeLineLabel.textContent = entry.label;
                lastLineKey = entry.key;
              }

              const envelope = lineEnvelope(driver.t, entry);
              const scale = 1 + envelope * 0.018;
              activeLine.style.transform = `translateY(${entry.y}px) scaleX(${scale})`;
              activeLine.style.opacity = String(0.18 + envelope * 0.52);
              activeLine.style.backgroundColor = `rgba(0, 98, 255, ${0.08 + envelope * 0.16})`;
            },
          },
          0,
        );

        timeline.to(
          approved,
          { scale: 0.72, opacity: 0, duration: 0.38, ease: "power2.in" },
          0.16,
        );

        timeline.fromTo(
          surface,
          { scale: 0.72, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.58, ease: "power3.out" },
          0.34,
        );

        timeline.fromTo(
          editorBase,
          { "--dof": "0px", opacity: 1 },
          { "--dof": "4px", opacity: 0.62, duration: 0.72, ease: "power2.inOut" },
          0.48,
        );

        timeline.fromTo(
          researchHighlight,
          { scaleX: 0.05, opacity: 0 },
          { scaleX: 1, opacity: 1, duration: 0.38, ease: "power3.out" },
          0.56,
        );

        timeline.fromTo(
          planHighlight,
          { scaleX: 0.05, opacity: 0 },
          { scaleX: 1, opacity: 1, duration: 0.38, ease: "power3.out" },
          0.94,
        );

        timeline.to(
          editorView,
          { scale: 1.2, x: -614, y: -134, duration: 0.74, ease: "power2.inOut" },
          1.5,
        );

        timeline.to(
          workflowCrop,
          { "--dof": "8px", opacity: 0.34, duration: 0.7, ease: "power2.inOut" },
          1.5,
        );

        timeline.fromTo(
          editorCrop,
          { opacity: 0 },
          { opacity: 1, duration: 0.7, ease: "power2.inOut" },
          1.5,
        );

        timeline.to(
          editorView,
          { x: -844, opacity: 0, duration: 0.3, ease: "power4.in" },
          3.54,
        );

        timeline.fromTo(
          buildView,
          { scale: 1.2, x: -30, y: -80, opacity: 0.35 },
          { scale: 1.2, x: -260, y: -80, opacity: 1, duration: 0.3, ease: "power4.out" },
          3.84,
        );

        timeline.fromTo(
          componentsCallout,
          { scale: 0.9, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.42, ease: "power3.out" },
          4.0,
        );

        timeline.fromTo(
          interactionsCallout,
          { scale: 0.9, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.42, ease: "power3.out" },
          4.66,
        );

        timeline.to(
          buildView,
          { scale: 1, x: 0, y: 0, duration: 0.7, ease: "power3.inOut" },
          5.8,
        );

        timeline.to(
          [componentsCallout, interactionsCallout],
          { opacity: 0.18, duration: 0.46, ease: "power2.out" },
          5.8,
        );

        timeline.to(
          buildBase,
          { "--dof": "0px", opacity: 1, duration: 0.7, ease: "power2.inOut" },
          5.8,
        );

        timeline.fromTo(
          filetreeCrop,
          { opacity: 0 },
          { opacity: 1, duration: 0.7, ease: "power2.inOut" },
          5.8,
        );

        fileRows.forEach((row, index) => {
          timeline.fromTo(
            row,
            { scaleX: 0.05, opacity: 0 },
            { scaleX: 1, opacity: 1, duration: 0.3, ease: "power3.out" },
            5.92 + index * 0.28,
          );
        });

        timeline.fromTo(
          together,
          { x: 28, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.34, ease: "power3.out" },
          6.4,
        );

        window.__timelines["04-visible-build"] = timeline;
      </script>
