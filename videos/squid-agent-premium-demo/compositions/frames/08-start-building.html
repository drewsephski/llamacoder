      <div
        id="root"

        data-width="1920"

      >
        <div
          id="f08-start-building-ground"
          class="clip f08-start-building-ground"
          data-start="0"
          data-duration="7.053"
          data-track-index="0"
        ></div>

        <div
          id="f08-start-building-stage"
          class="clip f08-start-building-stage"
          data-start="0"
          data-duration="7.053"
          data-track-index="1"
        >
          <img
            id="f08-start-building-hero-image"
            class="f08-start-building-hero-image"

            src="assets/01-hero-turn-ideas.png"
            alt=""
          />

        <div
          id="f08-start-building-hud"

          data-start="0"

          data-track-index="2"
        >
          <div class="f08-start-building-cue f08-start-building-cue-first" data-cue="first">
            From first idea
          </div>
          <div class="f08-start-building-cue f08-start-building-cue-keep" data-cue="keep">
            To an app you keep
          </div>

          <div class="f08-start-building-swap">
            <div id="f08-start-building-identity" class="f08-start-building-swap-state">
              <div class="f08-start-building-identity-crop">
                <img
                  class="f08-start-building-crop-image"
                  src="assets/01-hero-turn-ideas.png"
                  alt=""
                />
              </div>
            </div>

            <div
              id="f08-start-building-action"
              class="f08-start-building-swap-state f08-start-building-action"
            >

                <span class="f08-start-building-action-arrow">→</span>
              </div>

          <div id="f08-start-building-url" class="f08-start-building-url-rail">
            <span id="f08-start-building-url-text" class="f08-start-building-url-text"></span>
            <span id="f08-start-building-url-caret" class="f08-start-building-url-caret"></span>
          </div>

          <div id="f08-start-building-prompt" class="f08-start-building-prompt-crop">
            <img src="assets/01-hero-turn-ideas.png" alt="" data-layout-allow-overflow />
          </div>

          <div id="f08-start-building-ripple" class="f08-start-building-ripple"></div>

          <svg
            id="f08-start-building-cursor"
            class="f08-start-building-cursor"

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });
        const urlText = document.getElementById("f08-start-building-url-text");
        const urlCaret = document.getElementById("f08-start-building-url-caret");

        tl.set("#f08-start-building-hero-image", { "--dof": "0px", opacity: 0.72, scale: 1.025 }, 0);
        tl.set(".f08-start-building-cue", { opacity: 0, y: 18 }, 0);
        tl.set("#f08-start-building-identity", { opacity: 0, scale: 1 }, 0);
        tl.set("#f08-start-building-action", { opacity: 0, scale: 0.72 }, 0);
        tl.set("#f08-start-building-prompt", { opacity: 0, y: 18 }, 0);
        tl.set("#f08-start-building-url", { opacity: 0, y: 12 }, 0);
        tl.set("#f08-start-building-cursor", { opacity: 0, x: 1830, y: 120, scale: 1 }, 0);
        tl.set("#f08-start-building-ripple", { opacity: 0, scale: 0.3 }, 0);

        // Scene 1 — The full hero settles while the two promise cues sequence by content weight.
        tl.to(
          "#f08-start-building-hero-image",
          { opacity: 0.88, scale: 1, duration: 1.1, ease: "power2.out" },
          0.04,
        );

        const cueElements = gsap.utils.toArray(".f08-start-building-cue");
        const cueWeights = cueElements.map((element) => 0.5 + element.textContent.trim().length * 0.03);
        const cueWeightTotal = cueWeights.reduce((sum, value) => sum + value, 0);
        let cueWeightCursor = 0;

        cueElements.forEach((element, index) => {
          const cueStart = 0.16 + (cueWeightCursor / cueWeightTotal) * 0.92;
          tl.fromTo(
            element,
            { opacity: 0, y: 18 },
            { opacity: 1, y: 0, duration: 0.44, ease: "power3.out" },
            cueStart,
          );
          cueWeightCursor += cueWeights[index];
        });

        // Scene 2 — The atmosphere softens; official identity and prompt remain sharp at the morph.
        tl.to(
          "#f08-start-building-hero-image",
          { "--dof": "5px", opacity: 0.26, duration: 0.72, ease: "power2.inOut" },
          1.5,
        );
        tl.to(".f08-start-building-cue", { opacity: 0.22, duration: 0.55, ease: "power2.out" }, 1.54);
        tl.fromTo(
          "#f08-start-building-identity",
          { opacity: 0, scale: 0.92 },
          { opacity: 1, scale: 1, duration: 0.42, ease: "power3.out" },
          1.5,
        );
        tl.fromTo(
          "#f08-start-building-prompt",
          { opacity: 0, y: 18 },
          { opacity: 0.82, y: 0, duration: 0.62, ease: "power3.out" },
          1.52,
        );
        tl.to(
          "#f08-start-building-identity",
          { scale: 0.72, opacity: 0, duration: 0.38, ease: "power2.in" },
          1.92,
        );
        tl.fromTo(
          "#f08-start-building-action",
          { scale: 0.72, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.58, ease: "power3.out" },
          2.11,
        );

        // Scene 3 — Human-aimed decelerating approach; stable URL rail types beneath the action.
        tl.fromTo(
          "#f08-start-building-url",
          { opacity: 0, y: 12 },
          { opacity: 1, y: 0, duration: 0.44, ease: "power3.out" },
          3.02,
        );
        tl.fromTo(
          "#f08-start-building-cursor",
          { opacity: 0, x: 1830, y: 120, scale: 1 },
          { opacity: 1, x: 1026, y: 350, scale: 1, duration: 1.22, ease: "power2.out" },
          3.04,
        );

        const urlSequence = [
          { t: 0, text: "" },
          { t: 0.16, text: "squid" },
          { t: 0.38, text: "squidagent" },
          { t: 0.66, text: "squidagent.app" },
        ];

        function urlAt(time) {
          for (let i = urlSequence.length - 1; i >= 0; i -= 1) {
            if (time >= urlSequence[i].t) return urlSequence[i].text;
          }
          return "";
        }

        const urlDriver = { t: 0 };
        tl.to(
          urlDriver,
          {
            t: 1.08,
            duration: 1.08,
            ease: "none",
            onUpdate: () => {
              urlText.textContent = urlAt(urlDriver.t);
            },
          },
          3.12,
        );

        const blinkDriver = { p: 0 };
        tl.to(
          blinkDriver,
          {
            p: Math.PI * 2 * 3,
            duration: 2.15,
            ease: "none",
            onUpdate: () => {
              urlCaret.style.opacity = Math.sin(blinkDriver.p) > 0 ? "1" : "0";
            },
          },
          3.08,
        );

        // Scene 4 — Lockstep press, one bounded ripple, then a clicked-state hold to the end.
        tl.to(
          ["#f08-start-building-action", "#f08-start-building-cursor"],
          { scale: 0.92, duration: 0.16, ease: "power1.in" },
          5.3,
        );
        tl.to(
          "#f08-start-building-action",
          { backgroundColor: "#0ca8ff", duration: 0.16, ease: "power1.in" },
          5.3,
        );
        tl.fromTo(
          "#f08-start-building-ripple",
          { opacity: 0.76, scale: 0.3 },
          { opacity: 0, scale: 4.2, duration: 0.72, ease: "power2.out", immediateRender: false },
          5.32,
        );
        tl.to(
          ["#f08-start-building-action", "#f08-start-building-cursor"],
          { scale: 1, duration: 0.5, ease: "power3.out" },
          5.5,
        );
        tl.set("#f08-start-building-url-caret", { opacity: 0 }, 5.58);
        tl.to("#f08-start-building-prompt", { opacity: 0.46, duration: 0.54, ease: "power2.out" }, 5.56);

        window.__timelines["08-start-building"] = tl;
      </script>
