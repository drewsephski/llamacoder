      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        const tl = gsap.timeline({ paused: true });
        const world = document.getElementById("f03-plan-first-world");
        const scanPath = document.getElementById("f03-plan-first-scan-path");
        const scanLength = scanPath.getTotalLength();
        const cam = { scale: 1.55, x: 580, y: -530 };

        function applyCamera() {
          world.style.transform = `translate(${cam.x}px, ${cam.y}px) scale(${cam.scale})`;
        }

        applyCamera();

        tl.set(
          "#f03-plan-first-scan-path",
          { strokeDasharray: scanLength, strokeDashoffset: scanLength },
          0,
        );
        tl.set("#f03-plan-first-base", { "--dof": "0px", opacity: 0.9 }, 0);
        tl.set("#f03-plan-first-research-sharp", { "--dof": "0px", opacity: 1 }, 0);
        tl.set("#f03-plan-first-plan-sharp", { "--dof": "12px", opacity: 0.3 }, 0);
        tl.set(".f03-plan-first-cue", { opacity: 0, y: 18 }, 0);
        tl.set(".f03-plan-first-cue-rule", { scaleX: 0 }, 0);
        tl.set("#f03-plan-first-rail", { opacity: 0, x: 54 }, 0);
        tl.set("#f03-plan-first-cursor", { opacity: 0, x: 1810, y: 250, scale: 1 }, 0);
        tl.set("#f03-plan-first-approved", { opacity: 0 }, 0);
        tl.set("#f03-plan-first-pending", { opacity: 1 }, 0);

        // Scene 1 — Research is the sharp plane; the source region is traced in cobalt.
        tl.to(
          "#f03-plan-first-scan-path",
          { strokeDashoffset: 0, duration: 1.35, ease: "power2.out" },
          0.18,
        );
        tl.fromTo(
          "#f03-plan-first-scan-head",
          { x: 0, scaleX: 0.3, opacity: 0.35 },
          { x: 235, scaleX: 1, opacity: 1, duration: 1.15, ease: "power2.inOut" },
          0.32,
        );
        tl.to(
          "#f03-plan-first-base",
          { "--dof": "3px", opacity: 0.58, duration: 0.9, ease: "power2.inOut" },
          0.34,
        );

        // Scene 2 — The camera chases the workflow into Plan while focus racks between planes.
        tl.to(
          cam,
          {
            scale: 1.45,
            x: 162,
            y: -516,
            duration: 1.2,
            ease: "power3.inOut",
            onUpdate: applyCamera,
          },
          2.2,
        );
        tl.to(
          "#f03-plan-first-research-sharp",
          { "--dof": "10px", opacity: 0.32, duration: 0.85, ease: "power2.inOut" },
          2.2,
        );
        tl.to(
          "#f03-plan-first-plan-sharp",
          { "--dof": "0px", opacity: 1, duration: 0.85, ease: "power2.inOut" },
          2.2,
        );

        const cueElements = gsap.utils.toArray(".f03-plan-first-cue");
        const cueWeights = cueElements.map((element) => 0.5 + element.textContent.trim().length * 0.025);
        const cueWeightTotal = cueWeights.reduce((sum, value) => sum + value, 0);
        let cueWeightCursor = 0;

        cueElements.forEach((element, index) => {
          const cueStart = 2.34 + (cueWeightCursor / cueWeightTotal) * 1.95;
          const rule = element.querySelector(".f03-plan-first-cue-rule");
          tl.fromTo(
            element,
            { opacity: 0, y: 18 },
            { opacity: 1, y: 0, duration: 0.48, ease: "power3.out" },
            cueStart,
          );
          tl.to(rule, { scaleX: 1, duration: 0.42, ease: "power2.out" }, cueStart + 0.1);
          cueWeightCursor += cueWeights[index];
        });

        // Scene 3 — Pull back to the 70/30 editorial frame and make approval the sharp focal rail.
        tl.to(
          cam,
          {
            scale: 0.94,
            x: -70,
            y: -80,
            duration: 1.42,
            ease: "power3.inOut",
            onUpdate: applyCamera,
          },
          4.8,
        );
        tl.fromTo(
          "#f03-plan-first-rail",
          { opacity: 0, x: 54 },
          { opacity: 1, x: 0, duration: 0.72, ease: "power4.out" },
          5.08,
        );
        tl.to(
          "#f03-plan-first-base",
          { "--dof": "5px", opacity: 0.42, duration: 0.88, ease: "power2.inOut" },
          5.22,
        );
        tl.to(
          ["#f03-plan-first-research-sharp", "#f03-plan-first-plan-sharp"],
          { "--dof": "8px", opacity: 0.22, duration: 0.88, ease: "power2.inOut" },
          5.22,
        );
        tl.to(".f03-plan-first-cue", { opacity: 0.34, duration: 0.65, ease: "power2.out" }, 5.3);

        // Scene 4 — The cursor and approval control compress together, then lock on APPROVED.
        tl.fromTo(
          "#f03-plan-first-cursor",
          { opacity: 0, x: 1810, y: 250, scale: 1 },
          { opacity: 1, x: 1590, y: 589, scale: 1, duration: 0.65, ease: "power2.inOut" },
          7.2,
        );
        tl.to(
          ["#f03-plan-first-button", "#f03-plan-first-cursor"],
          { scale: 0.92, duration: 0.15, ease: "power1.in" },
          7.85,
        );
        tl.to(
          "#f03-plan-first-button",
          { backgroundColor: "#0062ff", duration: 0.15, ease: "power1.in" },
          7.85,
        );
        tl.set("#f03-plan-first-pending", { opacity: 0 }, 8.04);
        tl.set("#f03-plan-first-approved", { opacity: 1 }, 8.04);
        tl.to(
          ["#f03-plan-first-button", "#f03-plan-first-cursor"],
          { scale: 1, duration: 0.5, ease: "power3.out" },
          8.06,
        );

        window.__timelines["03-plan-first"] = tl;
      </script>
